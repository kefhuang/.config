# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# General behavior
set -g mouse on
set -g focus-events on
set -g history-limit 100000
set -sg escape-time 10
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g allow-rename off

# Terminal capabilities
set -g default-terminal "screen-256color"
set -as terminal-features ",screen-256color:RGB"
set -as terminal-features ",tmux-256color:RGB"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",alacritty:RGB"
set -as terminal-features ",kitty:RGB"
set -as terminal-features ",wezterm:RGB"

# Copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi C-v send -X rectangle-toggle
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection-and-cancel

# Windows and panes
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5
bind Tab last-window
bind n next-window
bind p previous-window
bind r source-file ~/.config/tmux/tmux.conf \; display-message "~/.config/tmux/tmux.conf reloaded"

# Status line
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-left-length 30
set -g status-right-length 100
set -g status-style "bg=colour235,fg=colour252"
set -g message-style "bg=colour31,fg=colour231"
set -g message-command-style "bg=colour31,fg=colour231"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour81"
set -g display-time 2000
set -g display-panes-time 1500
set -g status-left "#[bold,fg=colour81] #S #[default]"
set -g status-right "#[fg=colour250]#H #[fg=colour244]| #[fg=colour252]#{pane_current_path} #[fg=colour244]| #[fg=colour252]%Y-%m-%d %H:%M "
setw -g automatic-rename on
setw -g automatic-rename-format "#{b:pane_current_path}"
setw -g window-status-style "fg=colour250,bg=default"
setw -g window-status-format " #I:#W "
setw -g window-status-current-style "fg=colour231,bg=colour31"
setw -g window-status-current-format " #I:#W "
setw -g window-status-activity-style "fg=colour214,bg=default"
setw -g window-status-bell-style "fg=colour231,bg=colour160,bold"

# TPM plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "tmux-plugins/tmux-yank"
set -g @plugin "tmux-plugins/tmux-resurrect"
set -g @plugin "tmux-plugins/tmux-continuum"
set -g @continuum-restore "on"
set -g @continuum-save-interval "15"
set -g @resurrect-capture-pane-contents "on"

if-shell '[ -x ~/.config/tmux/plugins/tpm/tpm ]' 'run-shell ~/.config/tmux/plugins/tpm/tpm'
